<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE composition PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="jakarta.faces.facelets"
                template="./../../WEB-INF/template.xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="jakarta.faces.core"
                xmlns:h="jakarta.faces.html">

    <ui:define name="content">
        <h4>Harvest Reports.</h4>
        <p:growl id="growl" showDetail="true" life="5000" sticky="false" />
        <p:button outcome="/secured/userhome" value="Home" id="h_buttonid" icon="pi pi-home"/>
        &nbsp;&nbsp;&nbsp;
        <p:button value="Cancel" outcome="/secured/harvest/activehrvstlst"/>
        &nbsp;&nbsp;&nbsp;
        <f:metadata>
            <f:viewAction action="#{invForHarCropProd.fillHarvestValues()}" />
        </f:metadata>

        <div class="card">
            <h:form id="hrvstrptform" style="text-align: left">
                <div class="ui-g">
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <h:outputLabel for="harvestid" value="Select Harvest" />
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        
                        <p:selectOneMenu id="harvestid" value="#{invForHarCropProd.selectedHarvest}">
                            <f:selectItem itemLabel="-- Select --" itemValue="" noSelectionOption="true" />
                            <f:selectItems value="#{invForHarCropProd.harvests}" 
                                           var="hrvst"
                                           itemLabel="#{hrvst.siteName}-#{hrvst.harvestName}" 
                                           itemValue="#{hrvst.harvestid}"/> 
                            <p:ajax event="change" listener="#{invForHarCropProd.onHarvestChange}" update="cropid cropprodid" />
                        </p:selectOneMenu>
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <h:outputLabel for="cropid" value="Select Crop" />
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">                        
                        <p:selectOneMenu id="cropid" value="#{invForHarCropProd.selectedCrop}">
                            <f:selectItem itemLabel="-- Select --" itemValue="" noSelectionOption="true" />
                            <f:selectItems value="#{invForHarCropProd.crops}" 
                                           var="crop"
                                           itemLabel="#{crop.cropName}" 
                                           itemValue="#{crop.cropId}"/> 
                            <p:ajax event="change" listener="#{invForHarCropProd.onCropChange}" update="cropprodid" />
                        </p:selectOneMenu>
                    </div>
                    
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <h:outputLabel for="cropprodid" value="Select Product" />
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">                        
                        <p:selectOneMenu id="cropprodid" value="#{invForHarCropProd.selectedCropProd}">
                            <f:selectItem itemLabel="-- Select --" itemValue="" noSelectionOption="true" />
                            <f:selectItems value="#{invForHarCropProd.cropprods}" 
                                           var="cropprod"
                                           itemLabel="#{cropprod.productName}" 
                                           itemValue="#{cropprod.productId}"/> 
                            
                        </p:selectOneMenu>
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-3">
                        <p:commandButton styleClass="blue-button" 
                                         icon="fa fa-edit" 
                                         value="Summary"
                                         action="#{hrvstReport.summaryAll()}" >                                     
                        </p:commandButton>
                    </div>
                    
                </div>

            </h:form>
        </div>
    </ui:define>    

</ui:composition>
