<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE composition PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="jakarta.faces.facelets"
                template="./../../WEB-INF/template.xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="jakarta.faces.core"
                xmlns:h="jakarta.faces.html">
    
    <ui:define name="content">
        <p:growl id="growl" showDetail="true" />
        <h4>Perform Sales for the Crop.</h4>
        <f:metadata>
            <f:viewParam name="selectedCrop" value="#{addSales.selectedCrop}"></f:viewParam>
            <f:viewAction action="#{addSales.fillValues()}" />
        </f:metadata>

        <div class="card">
            <h:form id="salesaddform" style="text-align: left">
                <h5 style="text-align: center;">
                    #{addSales.selectedCropName}
                </h5> 
                <div class="ui-g">                    
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <h:outputLabel for="harvestid" value="Site and Harvest" />
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <p:selectOneRadio id="harvestid" value="#{addSales.selectedHarvest}"
                                          layout="pageDirection">
                            <f:selectItems value="#{addSales.harvestForCrop}" 
                                           var="harvest"
                                           itemLabel="#{harvest.siteName}-#{harvest.harvestName}" 
                                           itemValue="#{harvest.harvestid}"/> 
                            <p:ajax event="valueChange" listener="#{addSales.onSiteHarSelect}" 
                                    update="productTable"/>
                        </p:selectOneRadio>
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-3">
                        <h:outputLabel for="productid" value="Product Details" />
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-9">
                        <p:dataTable id="productTable" var="prodlist" 
                                     value="#{addSales.salesrecords}" 
                                     selectionMode="single" 
                                     selection="#{addSales.selectedProduct}" 
                                     rowKey="#{prodlist.prodId}" 
                                     style="font-size: 10px;">

                            <p:ajax event="rowSelect" 
                                    listener="#{addSales.onRowSelect}" 
                                    update="productTable" />                            

                            <p:column headerText="Product Name">
                                <h:outputText value="#{prodlist.productname}" /> 
                            </p:column>
                            
                            <p:column headerText="Current Qty">
                                <h:outputText value="#{prodlist.currentInventoryQty}" /> 
                            </p:column>

                            <p:column headerText="Qty sold">
                                <p:inputText value="#{prodlist.quantitySold}" 
                                             disabled="#{addSales.selectedProduct == null 
                                                         or addSales.selectedProduct.prodId != prodlist.prodId}" 
                                             size="10">                                    
                                    <p:keyFilter regEx="/[\d\.]/" />
                                </p:inputText>
                            </p:column>

                            <p:column headerText="Unit">
                                <h:outputText value="#{prodlist.produnit}" />
                                
                            </p:column>
                            
                            <p:column headerText="Price(Rs.)/unit">                                
                                <p:inputText value="#{prodlist.priceperUnit}" 
                                             disabled="#{addSales.selectedProduct == null 
                                                         or addSales.selectedProduct.prodId != prodlist.prodId}"
                                             size="10"> 
                                    <p:keyFilter regEx="/[\d\.]/" />
                                </p:inputText>
                            </p:column>

                        </p:dataTable>
                    </div>
                    
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <h:outputLabel for="sdate" value="Sales Date" />
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <p:datePicker id="sdate" value="#{addSales.sdate}" pattern="yyyy-MM-dd"/>
                    </div>

                    <div class="ui-g-12 ui-md-6 ui-lg-3">
                        <p:commandButton styleClass="blue-button" 
                                         value="Add"
                                         actionListener="#{addSales.goToAddSales}"
                                         update="@form growl" >                        
                        </p:commandButton>
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-3">
                        <p:commandButton styleClass="blue-button" 
                                         value="Add Again"
                                         action="#{addSales.goToAddAgainStock}"
                                         process="@this" >                        
                        </p:commandButton>
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-3">
                        <p:button icon="pi pi-times" value="Done" outcome="/secured/crop/maintaincrop" />
                    </div>
                </div>
                
            </h:form>
        </div>
    </ui:define>

</ui:composition>
