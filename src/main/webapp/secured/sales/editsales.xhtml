<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE composition PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="jakarta.faces.facelets"
                template="./../../WEB-INF/template.xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="jakarta.faces.core"
                xmlns:h="jakarta.faces.html">
    
    <ui:define name="content">
        <p:growl id="growl" showDetail="true" />
        <h4>Update Sales for the Crop.</h4>
        <f:metadata>
            <f:viewParam name="selectedCrop" value="#{editSales.selectedCrop}"></f:viewParam>
            <f:viewAction action="#{editSales.fillValues()}" />
        </f:metadata>

        <div class="card">
            <h:form id="salesaddform" style="text-align: left">
                <h5 style="text-align: center;">
                    #{editSales.selectedCropName}
                </h5> 
                <div class="ui-g">                    
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <h:outputLabel for="harvestid" value="Site and Harvest" />
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <h:outputText value="#{editSales.harvestForCrop.siteName}-
                                      #{editSales.harvestForCrop.harvestName}" style="font-weight:bold;"/>
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-3">
                        <h:outputLabel for="productid" value="Product Details" />
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-9">
                        <p:dataTable id="productTable" var="prodlist" 
                                     value="#{editSales.salesrecords}"                                      
                                     rowKey="#{prodlist.salesId}" 
                                     style="font-size: 10px;">
                                           

                            <p:column headerText="Product Name">
                                <h:outputText value="#{prodlist.productname}" /> 
                            </p:column>
                            
                            <p:column headerText="Current Qty">
                                <h:outputText value="#{prodlist.currentInventoryQty}" style="width: 110px;"/> 
                            </p:column>

                            <p:column headerText="Qty sold">
                                <p:inputText value="#{prodlist.quantitySold}" size="10" style="width: 110px;">                                    
                                    <p:keyFilter regEx="/[\d\.]/" />
                                </p:inputText>
                            </p:column>

                            <p:column headerText="Unit">
                                <h:outputText value="#{prodlist.produnit}" style="width: 110px;"/>
                                
                            </p:column>
                            
                            <p:column headerText="Price(Rs.)/unit">                                
                                <p:inputText value="#{prodlist.priceperUnit}" size="10" style="width: 110px;"> 
                                    <p:keyFilter regEx="/[\d\.]/" />
                                </p:inputText>
                            </p:column>
                            
                            <p:column headerText="Date">
                                <p:inputText value="#{prodlist.salesDate}" type="date" style="width: 110px;"/>
                            </p:column>
                        </p:dataTable>
                    </div>
                    
                    <div class="ui-g-12 ui-md-6 ui-lg-3">
                        <p:commandButton styleClass="blue-button" 
                                         value="Save"
                                         actionListener="#{editSales.goToEditSales}"
                                         update="@form growl" >                        
                        </p:commandButton>
                    </div>
                    
                    <div class="ui-g-12 ui-md-6 ui-lg-3">
                        <p:button icon="pi pi-times" value="cancel" outcome="/secured/sales/maintainsales" />
                    </div>
                </div>
                
            </h:form>
        </div>
    </ui:define>

</ui:composition>
