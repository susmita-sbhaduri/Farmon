<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE composition PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="jakarta.faces.facelets"
                template="./../../WEB-INF/template.xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="jakarta.faces.core"
                xmlns:h="jakarta.faces.html">

    <ui:define name="content">
        <h4>Maintain Vendor</h4>
        <p:growl id="growl" showDetail="true" />
        
        &nbsp;&nbsp;&nbsp;
        <p:button value="Add" outcome="/secured/shop/addshop"/>
        
        <f:metadata>
            <f:viewAction action="#{maintainShop.fillShopValues()}" />
        </f:metadata>

        <div class="card">            
            <h:form id="shopgrid" style="text-align: center">                
                <p:dataTable var="existingshop" value="#{maintainShop.shoplist}" 
                             reflow="true">
                    <p:column headerText="Vendor Name">
                        <h:outputText value="#{existingshop.shopName}" />
                    </p:column>
                                
                    <p:column>
                        <p:commandButton styleClass="blue-button" 
                                         value="Edit"
                                         action="#{maintainShop.editShop()}" >
                            <f:setPropertyActionListener value="#{existingshop}" target="#{maintainShop.selectedShop}" />
                        </p:commandButton>
                    </p:column>
                    <p:column>
                        <p:commandButton styleClass="blue-button" 
                                         value="Delete"
                                         action="#{maintainShop.deleteShop()}"
                                         disabled="#{not maintainShop.shopEditable[existingshop.shopId]}"
                                         >
                            <f:setPropertyActionListener value="#{existingshop}" target="#{maintainShop.selectedShop}" />
                        </p:commandButton>
                    </p:column>
                    
                </p:dataTable>
            </h:form>
        </div>
    </ui:define>    
</ui:composition>
