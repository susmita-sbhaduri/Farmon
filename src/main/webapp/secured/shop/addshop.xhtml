<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE composition PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="jakarta.faces.facelets"
                template="./../../WEB-INF/template.xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="jakarta.faces.core"
                xmlns:h="jakarta.faces.html">

   <ui:define name="content">
        <p:growl id="growl" showDetail="true" />
        <h4>Add New Vendor.</h4>
        <p:button outcome="/secured/userhome" value="Home" id="h_buttonid" icon="pi pi-home"/>


        <div class="card">
            <h:form id="shopaddform" style="text-align: left">
                <div class="ui-g">
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <h:outputLabel for="shopname" value="Name" />
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <h:inputText id="shopname" value="#{addShop.name}"/>   
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <h:outputLabel for="shopaddr" value="Address"/>
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <h:inputText id="shopaddr" value="#{addShop.address}" />
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <p:outputLabel for="shopph" value="Contact No." />
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <p:inputText id="shopph" value="#{addShop.phno}" maxlength="10">
                            <p:keyFilter regEx="/[0-9]/" />
                            <f:validateRegex pattern="^$|^\d{10}$" />
                        </p:inputText>
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <h:outputLabel for="atime" value="Availability Time" />
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <h:inputText id="atime" value="#{addShop.atime}" />
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <p:commandButton styleClass="blue-button" 
                                         value="Save"
                                         action="#{addShop.goToSaveShop()}">                        
                        </p:commandButton>
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <p:button icon="pi pi-times" value="Cancel" outcome="/secured/userhome" />
                    </div>
                </div>
            </h:form>
        </div>
    </ui:define>

</ui:composition>
