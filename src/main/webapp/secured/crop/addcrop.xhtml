<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE composition PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="jakarta.faces.facelets"
                template="./../../WEB-INF/template.xhtml"                
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="jakarta.faces.core"
                xmlns:h="jakarta.faces.html">

    <ui:define name="content">
        <p:growl id="growl" showDetail="true" />
        <h4>Add New Crop.</h4>
        <f:metadata>            
            <f:viewAction action="#{addCrop.fillValues()}" />
        </f:metadata>

        <div class="card">
            <h:form id="cropaddform" style="text-align: left">
                <div class="ui-g">
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <h:outputLabel for="cropname" value="Crop Name"/>
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <h:inputText id="cropname" value="#{addCrop.cropname}" />
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <p:outputLabel for="harvests" value="Site-Harvest Name" />
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <p:selectManyCheckbox id="harvests" value="#{addCrop.selectedHarvestIds}"
                                              layout="responsive"
                                              columns="3">
                            <f:selectItems value="#{addCrop.activeHarvests}" 
                                           var="harvest" 
                                           itemLabel="#{harvest.siteName}-#{harvest.harvestName}" 
                                           itemValue="#{harvest.harvestid}" />
                            <f:converter converterId="jakarta.faces.Integer" />
                        </p:selectManyCheckbox>
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <h:outputLabel value="Enter Products and Units" />
                    </div>

                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <p:dataTable id="producttable" value="#{addCrop.entries}" var="entry" 
                                     rowIndexVar="rowIndex" style="font-size: 10px;">

                            <p:column headerText="Product">
                                <p:inputText value="#{entry.productName}">
                                    <p:ajax event="change" 
                                            listener="#{addCrop.onInputChanged(rowIndex)}" 
                                            update="@form:producttable" />
                                </p:inputText> 
                            </p:column>

                            <p:column headerText="Unit">
                                <p:inputText value="#{entry.unit}">
                                    <p:ajax event="change" 
                                            listener="#{addCrop.onInputChanged(rowIndex)}" 
                                            update="@form:producttable" />
                                </p:inputText>
                            </p:column>

                        </p:dataTable>
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <h:outputLabel for="count" value="Total Count" />
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <h:inputText id="count" value="#{addCrop.totalcount}" />
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <h:outputLabel for="sdate" value="Start Date" />
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <p:datePicker id="sdate" value="#{addCrop.sdate}" pattern="yyyy-MM-dd"/>
                    </div>

                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <p:commandButton styleClass="blue-button" 
                                         value="Save"
                                         action="#{addCrop.goToSaveCrop()}" >                        
                        </p:commandButton>
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <p:button icon="pi pi-times" value="Cancel" outcome="/secured/crop/maintaincrop" />
                    </div>
                </div>
            </h:form>
        </div>
    </ui:define>

</ui:composition>
