<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE composition PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="jakarta.faces.facelets"
                template="./../../WEB-INF/template.xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="jakarta.faces.core"
                xmlns:h="jakarta.faces.html">

    <ui:define name="content">
        <p:growl id="growl" showDetail="true" />
        <h4>Add crop growth stage.</h4>
        <f:metadata>  
            <f:viewParam name="harvestId" value="#{addGrowthStage.harvestId}"></f:viewParam>
            <f:viewParam name="cropId" value="#{addGrowthStage.cropId}"></f:viewParam>
            <f:viewParam name="cropProdId" value="#{addGrowthStage.cropProdId}"></f:viewParam>
            <f:viewAction action="#{addGrowthStage.fillValues()}" />
        </f:metadata>

        <div class="card">
            <h:form id="growthaddform" style="text-align: left">
                <div class="ui-g">
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <h:outputLabel for="harvestid" value="Site and Harvest" />
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <h:outputText value="#{addGrowthStage.harvestRecord.siteName}-
                                      #{addGrowthStage.harvestRecord.harvestName}" style="font-weight:bold;"/>
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <h:outputLabel for="cropname" value="Crop Name"/>
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <h:outputText value="#{addGrowthStage.cropname}" style="font-weight:bold;"/>
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <h:outputLabel for="productname" value="Product Name"/>
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <h:outputText value="#{addGrowthStage.cropprodname}" style="font-weight:bold;"/>
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <h:outputLabel for="growthstage" value="Initial Stage" />
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <h:outputText value="#{addGrowthStage.firststage.prodStageName}" style="font-weight:bold;"/>
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <h:outputLabel for="count" value="Count" />
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <p:inputText id="count" value="#{addGrowthStage.count}" maxlength="10">
                            <p:keyFilter mask="num" />
                            <f:validateLongRange minimum="1" maximum="9999999999" /> 
                        </p:inputText>
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <h:outputLabel for="date" value="Date" />
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <p:datePicker id="date" value="#{addGrowthStage.date}" pattern="yyyy-MM-dd"/>
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <p:commandButton styleClass="blue-button" 
                                         value="Save"
                                         action="#{addCropStage.saveStages()}" >                        
                        </p:commandButton>
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <p:button icon="pi pi-times" value="Cancel" outcome="/secured/crop/maintaingrowthstage" />
                    </div>
                </div>
            </h:form>
        </div>
    </ui:define>

</ui:composition>
