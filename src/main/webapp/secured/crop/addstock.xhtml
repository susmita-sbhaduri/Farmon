<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE composition PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="jakarta.faces.facelets"
                template="./../../WEB-INF/template.xhtml"                                
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="jakarta.faces.core"
                xmlns:h="jakarta.faces.html">

    <ui:define name="content">
        <p:growl id="growl" showDetail="true" />
        <h4>Add Stock of the Crop.</h4>
        <f:metadata>
            <f:viewParam name="selectedCrop" value="#{addStock.selectedCrop}"></f:viewParam>
            <f:viewAction action="#{addStock.fillValues()}" />
        </f:metadata>

        <div class="card">
            <h:form id="stockaddform" style="text-align: left">
                <h5 style="text-align: center;">
                    #{addStock.selectedCropName}
                </h5> 
                <div class="ui-g">                    
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <h:outputLabel for="harvestid" value="Site and Harvest" />
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <p:selectOneRadio id="harvestid" value="#{addStock.selectedHarvest}"
                                          layout="pageDirection">
                            <f:selectItems value="#{addStock.harvestForCrop}" 
                                           var="harvest"
                                           itemLabel="#{harvest.siteName}-#{harvest.harvestName}" 
                                           itemValue="#{harvest.harvestid}"/>  
                            <p:ajax event="valueChange" listener="#{addStock.onSiteHarSelect}" 
                                    update="productTable"/>
                        </p:selectOneRadio>
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-3">
                        <h:outputLabel for="productid" value="Product Details" />
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-9">
                        <p:dataTable id="productTable" var="rowItem" 
                                     value="#{addStock.displayList}" 
                                     selectionMode="single" 
                                     selection="#{addStock.selectedProduct}" 
                                     rowKey="#{rowItem.product.id}" 
                                     style="font-size: 10px;">

                            <p:ajax event="rowSelect" 
                                    listener="#{addStock.onRowSelect}" 
                                    update="productTable" />                            

                            <p:column headerText="Product Name">
                                <h:outputText value="#{rowItem.product.productName}" /> 
                            </p:column>

                            <p:column headerText="Current Qty">
                                <h:outputText value="#{rowItem.existingQuantity}" /> 
                            </p:column>

                            <p:column headerText="Amount">
                                <p:inputText value="#{rowItem.product.totalstock}" 
                                             disabled="#{addStock.selectedProduct == null 
                                                         or addStock.selectedProduct.product.id != rowItem.product.id}" 
                                             size="10">                                    
                                    <p:keyFilter regEx="/[\d\.]/" />
                                </p:inputText>
                            </p:column>

                            <p:column headerText="Unit">
                                <h:outputText value="#{rowItem.product.unit}" /> 
                            </p:column>

                        </p:dataTable>
                    </div>

                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <h:outputLabel for="sdate" value="Stock Date" />
                    </div>
                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <p:datePicker id="sdate" value="#{addStock.sdate}" pattern="yyyy-MM-dd"/>
                    </div>

                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <p:commandButton styleClass="blue-button" 
                                         value="Add"
                                         actionListener="#{addStock.goToAddStock}"
                                         update="@form growl" >                        
                        </p:commandButton>
                    </div>

                    <div class="ui-g-12 ui-md-6 ui-lg-6">
                        <p:button icon="pi pi-times" value="Done" outcome="/secured/crop/maintaincrop" />
                    </div>
                </div>

            </h:form>
        </div>
    </ui:define>

</ui:composition>
